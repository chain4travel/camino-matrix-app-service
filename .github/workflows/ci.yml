name: CI

on:
  pull_request:
    branches: [c4t, dev]
  workflow_dispatch:

# Cancel ongoing workflow runs if a new one is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  go_version: "~1.23.5"

permissions:
  # Required: allow read access to the content for analysis.
  contents: read
  # Optional: allow read access to pull request. Use with `only-new-issues` option.
  pull-requests: read
  # Optional: allow write access to checks to allow the action to annotate code in the PR.
  checks: write

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.go_version }}
      - name: build_test
        shell: bash
        run: scripts/build_test.sh

  # When the golangci-lint version is updated here, also update it in scripts/lint.sh
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.go_version }}
      - name: Execute linter script
        shell: bash
        run: scripts/lint.sh
  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        shell: bash
        run: scripts/shellcheck.sh
        
  check_clean_branch:
    name: Check that go mod tidy is performed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.go_version }}
      - name: Go Mod Tidy
        shell: bash
        run: go mod tidy
      - name: Check Clean Branch
        shell: bash
        run: .github/workflows/check-clean-branch.sh

  build_docker:
    name: Build docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Build and push Docker images
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            c4tplatform/camino-matrix-app-service:temp
